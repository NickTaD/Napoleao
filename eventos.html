<!DOCTYPE html> 
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventos - Escola Napoleão</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #005bea, #00c6fb);
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    display: flex;
    width: 1100px;
    max-width: 95%;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

.content-side {
    flex: 1.3;
    padding: 30px;
    overflow-y: auto;
}

/* 🔥 TOPO COMPLETO */
.top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
}

/* lado esquerdo (botão + título) */
.left-top {
    display: flex;
    align-items: center;
    gap: 15px;
}

.top-bar h1 {
    color: #005bea;
}

/* Botão voltar */
.back-btn {
    color: white;
    background: linear-gradient(90deg,#005bea,#00c6fb);
    padding: 8px 15px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
}

/* Busca */
.search-box {
    position: relative;
    width: 320px;
}

.search-box input {
    width: 100%;
    padding: 8px 35px 8px 12px;
    border-radius: 999px;
    border: 1px solid #ccc;
    outline: none;
}

.search-box span {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
}

/* Cards */
.card {
    background: #f9f9f9;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.card h2 {
    color: #005bea;
    margin-bottom: 5px;
}

.card p {
    font-size: 14px;
}

/* Responsivo */
@media (max-width: 768px) {
    .top-bar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .search-box {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="content-side">

        <div class="top-bar">

            <div class="left-top">
                <a href="index.html" class="back-btn">⬅ Voltar</a>
                <h1>📅 Eventos</h1>
            </div>

            <div class="search-box">
                <input type="text" placeholder="Pesquisar eventos">
                <span>🔍</span>
            </div>

        </div>

        <div class="card">
            <h2>Feira de Ciências</h2>
            <p>Data: 15/05/2026</p>
            <p>Apresentação de projetos dos alunos.</p>
        </div>

        <div class="card">
            <h2>Semana Cultural</h2>
            <p>Data: 22/06/2026</p>
            <p>Atividades artísticas e apresentações.</p>
        </div>

        <div class="card">
            <h2>Jogos Escolares</h2>
            <p>Data: 10/08/2026</p>
            <p>Competições esportivas entre turmas.</p>
        </div>

    </div>

</div>

</body>
</html>
