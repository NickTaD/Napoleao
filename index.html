<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escola Napoleão</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #005bea, #00c6fb);
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    display: flex;
    width: 1100px;
    max-width: 95%;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

.image-side {
    flex: 1;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
}

.image-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.content-side {
    flex: 1.3;
    padding: 30px;
    overflow-y: auto;
}

/* Topo */
.top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.top-bar h1 {
    color: #005bea;
    font-size: 22px;
}

/* BARRA DE PESQUISA AJUSTADA */
.search-box {
    position: relative;
    width: 320px; /* aumentada */
    margin-left: auto; /* empurra para direita e cresce para esquerda */
}

.search-box input {
    width: 100%;
    padding: 8px 35px 8px 12px;
    border-radius: 999px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

.search-box input:focus {
    box-shadow: 0 0 0 2px rgba(0,91,234,0.2);
}

.search-box span {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
}

/* Cards */
.card {
    background: #f9f9f9;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.card h2 {
    color: #005bea;
    margin-bottom: 8px;
}

.card p, .card li {
    font-size: 14px;
}

ul {
    list-style: none;
}

a {
    color: #005bea;
    text-decoration: none;
}

/* Responsivo */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }

    .image-side {
        height: 200px;
    }

    .content-side {
        padding: 20px;
    }

    .top-bar {
        flex-direction: column;
        gap: 10px;
    }

    .search-box {
        width: 100%; /* ocupa tudo no celular */
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="content-side">

        <div class="top-bar">
            <h1>Escola Napoleão</h1>

            <div class="search-box">
                <input type="text" placeholder="Pesquisar">
                <span>🔍</span>
            </div>
        </div>

        <div class="card">
            <h2>📍 Endereço</h2>
            <p>
                Irauna, 815, Rua<br>
                Indianopolis<br>
                São Paulo - SP
            </p>
        </div>

        <div class="card">
            <h2>🔗 Links Úteis</h2>
            <ul>
  <li><a href="boletim.html">Boletim Online</a></li>
  <li><a href="secretaria.html">Secretaria</a></li>
  <li><a href="cursos.html">Cursos</a></li>
  <li><a href="eventos.html">Eventos</a></li>
</ul>
        </div>

        <div class="card">
            <h2>⏰ Horário</h2>
            <p>Manhã / Tarde</p>
        </div>

        <div class="card">
            <h2>📞 Contato</h2>
            <p>(11) 5561-1492</p>
            <p>Email: e003924a@educacao.sp.gov.br</p>
        </div>

    </div>

</div>

</body>
</html>
