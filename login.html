<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Escola Napoleão</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #005bea, #00c6fb);
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    display: flex;
    width: 900px;
    max-width: 95%;
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

/* IMAGEM */
.image-side {
    flex: 1;
    background: #f5f5f5;
}

.image-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* LOGIN */
.login-side {
    flex: 1;
    padding: 40px;
}

.login-side h2 {
    color: #005bea;
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
}

.input-group label {
    font-size: 14px;
    color: #555;
}

.input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
}

.input-group input:focus {
    border-color: #005bea;
    box-shadow: 0 0 0 2px rgba(0,91,234,0.2);
}

.login-btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg,#005bea,#00c6fb);
    color: white;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
}

.login-btn:hover {
    opacity: 0.9;
}

.extra {
    margin-top: 15px;
    font-size: 13px;
}

.extra a {
    color: #005bea;
    text-decoration: none;
}

/* 📱 CELULAR → ESCONDE IMAGEM */
@media (max-width: 768px) {
    .container {
        flex-direction: column;
    }

    .image-side {
        display: none;
    }

    .login-side {
        padding: 25px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- IMAGEM (só no PC) -->
    <div class="image-side">
        <img src="https://static.vecteezy.com/system/resources/previews/024/724/631/non_2x/a-happy-smiling-young-college-student-with-a-book-in-hand-isolated-on-a-transparent-background-generative-ai-free-png.png" alt="Aluno">
    </div>

    <!-- LOGIN -->
    <div class="login-side">
        <h2>Login</h2>

        <form>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Digite seu email" required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" placeholder="Digite sua senha" required>
            </div>

            <button class="login-btn">Entrar</button>
        </form>

        <div class="extra">
            <a href="#">Esqueceu a senha?</a>
        </div>
    </div>

</div>

</body>
</html>
